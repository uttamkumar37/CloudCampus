# ── DEV profile ───────────────────────────────────────────────────────────
# Uses the Docker Compose PostgreSQL instance (localhost:5432).
# Start local services first: docker compose up -d
# Connection details match docker-compose.yml (POSTGRES_USER / POSTGRES_PASSWORD).

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cloudcampus
    driver-class-name: org.postgresql.Driver
    username: cloudcampus
    password: cloudcampus_dev
    # C-20: Simulate realistic pool pressure even in dev.
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000    # 3 seconds — fail fast if pool is exhausted
      idle-timeout: 300000        # 5 minutes
      max-lifetime: 1200000       # 20 minutes
      pool-name: cloudcampus-dev-pool

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

  # Redis — connect to local Docker Redis (see docker-compose.yml).
  # If Redis is not running, app starts in degraded mode (caches miss-through to DB).
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 1s
      timeout: 500ms

  # ── Mail — MailHog SMTP catcher (docker-compose localhost:1025) ─────────────
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  # Dev overrides — use fixed keys so empty env vars don't shadow the base defaults.
  encryption:
    secret: "dev-aes-key-for-local-only-do-not-use-in-production-32+"
  retention:
    soft-delete-retention-days: 90

# ── OpenAPI / Swagger UI — enabled in dev only ────────────────────────────────
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
