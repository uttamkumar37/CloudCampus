server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: digital-school-saas
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/campuscloud}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  tenant:
    header-name: X-Tenant-ID
    default-schema: public
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-secret-key-to-a-secure-value-min-32-bytes}
      access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}
    bootstrap-admin:
      username: ${BOOTSTRAP_ADMIN_USERNAME:superadmin}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:admin@123}
      role: ${BOOTSTRAP_ADMIN_ROLE:SUPER_ADMIN}
